<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎈 TO. 하민정 🎈</title>
    <!-- 아기자기하고 동글동글한 모던 글꼴 로드 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fff6f8;
            --main-pink: #ffb7c5;
            --dark-pink: #ff7b94;
            --apple-red: #ff6b8b;
            --leaf-green: #a8dfb5;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Gowun Dodum', sans-serif;
            color: #4a4a4a;
            overflow-x: hidden;
        }

        /* 공통 애니메이션 효과 */
        .heart-rain {
            position: absolute;
            color: var(--main-pink);
            font-size: 20px;
            animation: fall linear infinite;
            z-index: 0;
            user-select: none;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* --- STAGE 1: 인트로 --- */
        #stage1 { z-index: 10; }
        .intro-box {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 183, 197, 0.25);
            text-align: center;
            border: 2px solid var(--main-pink);
            max-width: 360px;
            width: 90%;
            z-index: 2;
        }
        .intro-box h1 {
            font-family: 'Dongle', sans-serif;
            font-size: 64px;
            margin: 0 0 10px 0;
            color: var(--dark-pink);
            line-height: 1;
        }
        .intro-box p {
            font-size: 16px;
            color: #777;
            margin-bottom: 30px;
        }
        .btn-container {
            position: relative;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Gowun Dodum', sans-serif;
        }
        .btn-yes {
            background-color: var(--dark-pink);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 123, 148, 0.3);
            z-index: 5;
            transition: transform 0.2s;
        }
        .btn-yes:hover { transform: scale(1.05); }
        .btn-no {
            background-color: #eee;
            color: #888;
            position: absolute;
            z-index: 4;
            transition: left 0.15s ease-out, top 0.15s ease-out;
            white-space: nowrap;
        }

        /* --- STAGE 2 & 3: 메인 아카이브 --- */
        #stage2 {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            padding: 40px 20px;
        }
        .main-card {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 35px;
            padding: 30px 25px;
            box-shadow: 0 10px 40px rgba(255, 183, 197, 0.15);
            border: 1px solid #fff0f2;
            z-index: 2;
            box-sizing: border-box;
        }
        .main-title {
            font-family: 'Dongle', sans-serif;
            font-size: 55px;
            margin: 0;
            text-align: center;
            color: var(--dark-pink);
            line-height: 1;
        }
        .main-subtitle {
            font-size: 15px;
            color: #999;
            text-align: center;
            margin: 5px 0 25px 0;
        }

        /* 🌳 모던 일러스트 느낌의 사과나무 가든 🌳 */
        .tree-container {
            position: relative;
            width: 100%;
            height: 280px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 파스텔 핑크빛 나무 실루엣 */
        .tree-crown {
            position: absolute;
            width: 260px;
            height: 230px;
            background: #ffe3e8;
            border-radius: 50% 50% 45% 45%;
            top: 10px;
            box-shadow: inset -15px -15px 0 rgba(255, 183, 197, 0.4);
        }
        .tree-trunk {
            position: absolute;
            width: 24px;
            height: 60px;
            background: #e2b3b3;
            bottom: 0;
            border-radius: 5px;
        }
        
        /* 사과 열매 스타일 */
        .apple {
            position: absolute;
            width: 34px;
            height: 34px;
            background-color: var(--apple-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(255, 107, 139, 0.3);
            transition: transform 0.2s, background-color 0.2s;
            user-select: none;
            z-index: 3;
        }
        .apple::after { /* 사과 나뭇잎 */
            content: '';
            position: absolute;
            top: -3px;
            right: 8px;
            width: 8px;
            height: 6px;
            background: var(--leaf-green);
            border-radius: 0 100% 0 100%;
        }
        .apple:hover {
            transform: scale(1.3) rotate(10deg);
            background-color: var(--dark-pink);
        }
        /* 보너스 특별 열매 (생일/미래) */
        .apple.special {
            background-color: #ffca28;
            box-shadow: 0 4px 8px rgba(255, 202, 40, 0.4);
        }
        .apple.special::after { background: var(--leaf-green); }

        /* 💬 말랑말랑 스토리 툴팁 */
        .tooltip-box {
            background: #fff8f9;
            border: 1.5px dashed var(--main-pink);
            border-radius: 20px;
            padding: 20px;
            min-height: 70px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.2s ease;
        }
        .tooltip-date {
            font-weight: bold;
            color: var(--dark-pink);
            margin-bottom: 6px;
            font-size: 15px;
        }
        .tooltip-content {
            font-size: 15px;
            line-height: 1.5;
            word-break: keep-all;
        }

        /* 🧾 STAGE 3: 영수증 하단부 느낌의 감동 엔딩 */
        .receipt-footer {
            border-top: 2px dashed #ddd;
            padding-top: 20px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            width: 100%;
            box-sizing: border-box;
        }
        .receipt-line {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 13px;
            color: #888;
            margin-bottom: 5px;
        }
        .signature-area {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .signature-text {
            font-family: 'Dongle', sans-serif;
            font-size: 38px;
            color: var(--dark-pink);
            line-height: 1;
            transform: rotate(-3deg);
            display: inline-block;
        }
    </style>
</head>
<body>

    <!-- STAGE 1: 인트로 -->
    <div id="stage1" class="section">
        <div class="intro-box">
            <h1>TO. 하민정..</h1>
            <p>아래 버튼 눌러주세요.</p>
            <div class="btn-container">
                <!-- 기준이 되는 수락 버튼 -->
                <button class="btn btn-yes" id="yes-btn" onclick="openArchive()">계속 보여줘! 💖</button>
                <!-- 근처에서만 가볍게 튕기는 거절 버튼 -->
                <button class="btn btn-no" id="runaway-btn">안보여줘도돼 ㅠ</button>
            </div>
        </div>
    </div>

    <!-- STAGE 2 & 3: 메인 콘텐츠 -->
    <div id="stage2" class="section">
        <div class="main-card">
            <h1 class="main-title">너와의 추억들 .. 🎈</h1>
            <div class="main-subtitle">하나씩 눌러봐!</div>
            
            <!-- 사과나무 정원 (위치는 부드럽게 분산 배치) -->
            <div class="tree-container">
                <div class="tree-crown"></div>
                <div class="tree-trunk"></div>
                
                <!-- 사과 열매들 (위치 좌표 세팅) -->
                <div class="apple" style="top: 40px; left: 150px;" onclick="showStory(0)">🍎</div>
                <div class="apple" style="top: 60px; left: 210px;" onclick="showStory(1)">🍎</div>
                <div class="apple" style="top: 75px; left: 95px;" onclick="showStory(2)">🍎</div>
                <div class="apple" style="top: 110px; left: 145px;" onclick="showStory(3)">🍎</div>
                <div class="apple" style="top: 120px; left: 250px;" onclick="showStory(4)">🍎</div>
                <div class="apple" style="top: 130px; left: 80px;" onclick="showStory(5)">🍎</div>
                <div class="apple" style="top: 175px; left: 120px;" onclick="showStory(6)">🍎</div>
                <div class="apple" style="top: 170px; left: 185px;" onclick="showStory(7)">🍎</div>
                <div class="apple" style="top: 165px; left: 245px;" onclick="showStory(8)">🍎</div>
                <div class="apple" style="top: 100px; left: 195px;" onclick="showStory(9)">🍎</div>
                <div class="apple special" style="top: 45px; left: 105px;" onclick="showStory(10)">🎂</div>
                <div class="apple special" style="top: 215px; left: 155px;" onclick="showStory(11)">✨</div>
            </div>

            <!-- 💬 스토리 출력 공간 -->
            <div class="tooltip-box" id="tooltip">
                <div class="tooltip-content" style="color: #999; font-weight: bold;">🔎확인중</div>
            </div>

            <!-- 🧾 STAGE 3: 깔끔한 영수증 서명란 마감 -->
            <div class="receipt-footer">
                <div class="receipt-line">
                    <span>우정 지수 (Friendship)</span>
                    <span style="font-weight: bold; color: var(--dark-pink);">★ ★ ★ ★ ★ 무한대</span>
                </div>
                <div class="receipt-line">
                    <span>발급일자 (Date)</span>
                    <span id="current-date">2026.05.27</span>
                </div>
                <div class="signature-area">
                    <span>서명 (Signature) :</span>
                    <span class="signature-text">너무 고마워..💗</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 10가지 소중한 에피소드 데이터 세팅
        const stories = [
            { date: "2020년 3월 6일 🎬", text: "분더샵 BTS 논란 있던 역사적인 날ㅋㅋㅋ 우리 이때 진짜 뽀짝하고 웃겼는데 기억나? 항상 생각하면 웃음 벨이야🤣" },
            { date: "2020년 3월 7일 🎡", text: "코로나 터졌을 때 눈치게임 대성공하며 갔던 에버랜드! 마스크 쓰고도 서로 얼굴만 보면 깔깔거리던 시절이 벌써 한참 전이네 🥺" },
            { date: "2020년 4월 11일 🌃", text: "민우오빠 생일이라 다 같이 이태원에서 뭉쳤던 날!! 우린 뭉치면 항상 예상치 못한 추억 서사가 꼭 하나씩 생성되는 듯 크크" },
            { date: "2020년 8월 16일 ⛰️", text: "다 함께 떠났던 대박적 충주의 추억...💚 푸릇푸릇하고 찐하게 놀았던 여름날의 기억은 아직도 사진 보면 어제 일 같아." },
            { date: "2022년 4월 16일 🚄", text: "나랑 둘이 부산 가준 날 🎶 맛있는 거 잔뜩 먹고 바다 보면서 속 시원하게 힐링 제대로 했던 최고의 베프 여행 패키지!" },
            { date: "2022년 12월 21일 🤢", text: "우리 집에서 하민정 대차게 술병 난 날ㅋㅋㅋ큐ㅠㅠㅠ 진짜 킹받는데 귀여운 흑역사라 내 기억 속 소중한 보물창고에 평생 소장 예정🔒" },
            { date: "2023년 1월 5일 🌴", text: "새해 되자마자 같이 제주도로 날아갔던 날! 🌴 비행기 탈 때부터 내내 텐션 폭발해서 힐링 그 자체였던 소중한 겨울 제주!" },
            { date: "2024년 10월 14일 🏢", text: "우리끼리 분위기 내러 롯데월드타워에서 맛있는 거 푸드파이터처럼 조진 날.. 뷰도 좋고 맛도 좋고 너랑 있어서 완벽했던 하루!" },
            { date: "2025년 4월 5일 🌸", text: "우리 넷이서 완전체로 떠났던 도쿄 여행! 💗 벚꽃 시즌에 맞춰서 일본 길거리 뽀개고 감성 충전했던 인생 여행지 중 하나!" },
            { date: "2026년 5월 8일 ⛺", text: "🔥 고마움 지수 별 5개 🔥\n혼자 텐트까지 영차영차 다 쳐놓고 나 캠핑 초대해 준 날! 진짜 감동 눈물 서사였고 절대 평생 잊지 못할 춱이야 고마워 민정아" },
            { date: "매년 우리의 🎂", text: "서로의 생일날 다수! 생일 핑계 대고 맛있는 거 먹으면서 아주 요란법석 축하하고 세상 신나게 놀았던 모든 날들이 다 행복이었어 🥳" },
            { date: "Loading Future... ✨", text: "그리고 앞으로 우리가 같이 채워나갈 수만 가지 추억 조각들! 언제나 곁에 있어줘서 고마워 내 칭구 민정아 💖" }
        ];

        // 스토리 출력 함수
        function showStory(index) {
            const tooltip = document.getElementById('tooltip');
            const data = stories[index];
            tooltip.style.opacity = 0;
            
            setTimeout(() => {
                tooltip.innerHTML = `
                    <div class="tooltip-date">${data.date}</div>
                    <div class="tooltip-content">${data.text.replace(/\n/g, '<br>')}</div>
                `;
                tooltip.style.opacity = 1;
            }, 150);
        }

        // 튕기는 거절 버튼 로직 (수락 버튼 근처에서만 맴돌도록 커스텀)
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('runaway-btn');

        // 초기 위치 수락 버튼 살짝 옆에 배치
        function setInitialNoBtn() {
            noBtn.style.left = (yesBtn.offsetLeft + yesBtn.offsetWidth + 10) + 'px';
            noBtn.style.top = yesBtn.offsetTop + 'px';
        }
        window.onload = setInitialNoBtn;

        function moveNoBtn() {
            const rect = yesBtn.getBoundingClientRect();
            // 수락 버튼 중심 기준 약 90px~130px 반경 내에서 튕기도록 범위를 작게 제한
            const angle = Math.random() * Math.PI * 2;
            const distance = 90 + Math.random() * 40; 
            
            const newX = rect.left + rect.width/2 + Math.cos(angle) * distance - noBtn.offsetWidth/2 + window.scrollX;
            const newY = rect.top + rect.height/2 + Math.sin(angle) * distance - noBtn.offsetHeight/2 + window.scrollY;
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${Math.max(10, Math.min(newX, window.innerWidth - noBtn.offsetWidth - 10))}px`;
            noBtn.style.top = `${newY}px`;
        }

        noBtn.addEventListener('mouseover', moveNoBtn);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveNoBtn(); });

        // 페이지 전환 함수
        function openArchive() {
            document.getElementById('stage1').style.display = 'none';
            const stage2 = document.getElementById('stage2');
            stage2.style.display = 'flex';
            setTimeout(() => {
                stage2.style.opacity = 1;
                // 맨 처음 진입 시에는 요구사항에 맞춰 기본 추억 오픈 없이 "🔎확인중" 상태 유지
            }, 50);
            
            // 사랑스러운 하트비 내리기 효과 시작
            setInterval(createHeart, 350);
        }

        // 하트 이모지 비 내리는 효과
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-rain');
            heart.innerText = ['💖','✨','🤍','🍎','🌸'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.fontSize = Math.random() * 12 + 15 + 'px';
            document.body.appendChild(heart);

            setTimeout(() => { heart.remove(); }, 4500);
        }
    </script>
</body>
</html>
